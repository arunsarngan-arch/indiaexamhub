<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Papers – IndiaExamHub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">IndiaExamHub</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span class="bar top"></span>
        <span class="bar middle"></span>
        <span class="bar bottom"></span>
      </button>
      <div class="nav-links" id="navLinks"></div>
    </div>
  </nav>

  <section class="container">
    <div class="section-head">
      <div class="overline">Previous Year Papers</div>
      <h2>Question Papers</h2>
      <p>Download previous year question papers. More papers added regularly — bookmark and check back!</p>
    </div>

    <!-- Search + Filters -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by exam name, subject, or year..." />
    </div>

    <div class="filter-tabs" id="categoryTabs">
      <button class="filter-tab active" data-cat="">All</button>
      <button class="filter-tab" data-cat="Engineering UG">Engineering UG</button>
      <button class="filter-tab" data-cat="Engineering PG">GATE / PG</button>
      <button class="filter-tab" data-cat="Medical UG">Medical</button>
      <button class="filter-tab" data-cat="Civil Services">UPSC</button>
      <button class="filter-tab" data-cat="MBA">MBA</button>
      <button class="filter-tab" data-cat="Government">SSC / Govt</button>
      <button class="filter-tab" data-cat="School">School Boards</button>
      <button class="filter-tab" data-cat="Teaching">CTET</button>
    </div>

    <div id="papersContainer" class="papers-list"></div>
  </section>

  <footer>
    <div class="footer-grid">
      <div class="footer-brand">
        <a href="index.html" class="logo">IndiaExamHub</a>
        <p>Free previous year question papers for all major Indian exams.</p>
      </div>
      <div class="footer-col">
        <h4>Quick Links</h4>
        <a href="index.html">Home</a>
        <a href="results.html">Results</a>
        <a href="jobs.html">Jobs</a>
        <a href="profile.html">My Library</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 IndiaExamHub</span>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("papersContainer");

      function renderPapers(list) {
        if (list.length === 0) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><p>No papers found for this filter.</p></div>`;
          return;
        }
        container.innerHTML = list.map(paper => `
          <div class="paper-card">
            <div class="paper-icon">PDF</div>
            <div class="paper-info">
              <div class="paper-title">${paper.title}</div>
              <div class="paper-meta">${paper.exam} &nbsp;•&nbsp; ${paper.year} &nbsp;•&nbsp; ${paper.subject} &nbsp;•&nbsp; <span style="color:var(--primary); font-weight:600;">${paper.category}</span></div>
            </div>
            <div class="paper-actions">
              <a href="${paper.file}" target="_blank" class="btn btn-primary btn-sm">Open PDF</a>
              <button onclick='addToLibrary(${JSON.stringify(paper)})' class="btn btn-outline-dark btn-sm">
                + Save
              </button>
            </div>
          </div>
        `).join("");
      }

      renderPapers(questionPapers);

      // Category tabs
      document.querySelectorAll(".filter-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          applyFilters();
        });
      });

      document.getElementById("searchInput").addEventListener("input", applyFilters);

      function applyFilters() {
        const cat = document.querySelector(".filter-tab.active")?.dataset.cat || "";
        const query = document.getElementById("searchInput").value.toLowerCase();
        const filtered = questionPapers.filter(p => {
          const matchCat = !cat || p.category.includes(cat);
          const matchQ = !query || p.title.toLowerCase().includes(query) || p.exam.toLowerCase().includes(query) || p.subject.toLowerCase().includes(query) || String(p.year).includes(query);
          return matchCat && matchQ;
        });
        renderPapers(filtered);
      }
    });
  </script>
</body>
</html>
