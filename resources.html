<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Resources – IndiaExamHub</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="dark-mode.css"/>
  <style>
    /* Centered search bar wrapper */
    .search-wrap-centered {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .search-wrap-centered .search-wrap {
      max-width: 600px !important;
      width: 100%;
      margin: 0 !important;
    }

    .resource-filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 24px 0;
      justify-content: center;
    }
    .resource-filter-btn {
      padding: 10px 16px;
      border: 2px solid var(--border);
      background: white;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      color: var(--text);
    }
    .resource-filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .resource-filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 32px 0;
    }
    .resource-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .resource-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-6px);
    }
    .resource-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .resource-icon {
      font-size: 2.5rem;
      line-height: 1;
    }
    .resource-meta {
      flex: 1;
    }
    .resource-type-badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .resource-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .resource-category {
      font-size: 0.85rem;
      color: var(--gray);
      font-weight: 500;
    }
    .resource-rating {
      font-weight: 700;
      color: var(--primary);
      font-size: 0.9rem;
    }
    .resource-desc {
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 12px 0;
      flex: 1;
    }
    .resource-meta-info {
      font-size: 0.85rem;
      color: var(--gray);
      margin: 8px 0;
      line-height: 1.4;
    }
    .resource-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }
    .tag {
      background: var(--muted-purple);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag.popular {
      background: linear-gradient(135deg, var(--accent-light), #fed7aa);
      color: var(--accent);
    }
    .resource-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .resource-footer-info {
      font-size: 0.85rem;
      color: var(--gray);
    }
    .free-badge {
      color: var(--success);
      font-weight: 700;
      background: rgba(5, 150, 105, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .resource-btn {
      padding: 8px 14px;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .empty-resources {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) {
      .resources-grid {
        grid-template-columns: 1fr;
      }
      .resource-filter-tabs {
        justify-content: flex-start;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>

    function renderResources(resources) {
      const container = document.getElementById("resourcesGrid");
      
      if (resources.length === 0) {
        container.innerHTML = `
          <div class="empty-resources" style="grid-column: 1/-1;">
            <div class="empty-icon">🔍</div>
            <h3>No resources found</h3>
            <p>Try a different search or filter</p>
          </div>
        `;
        return;
      }

      container.innerHTML = resources.map(resource => `
        <div class="resource-card">
          <div class="resource-header">
            <div class="resource-icon">${resource.icon}</div>
            <div class="resource-meta">
              <div class="resource-type-badge">${resource.type}</div>
              <div class="resource-name">${resource.name}</div>
              <div class="resource-category">${resource.category}</div>
              <div class="resource-rating">⭐ ${resource.rating}</div>
            </div>
          </div>

          <p class="resource-desc">${resource.description}</p>

          <div class="resource-meta-info">
            ${resource.subscribers ? `📊 ${resource.subscribers} subscribers<br>` : ""}
            ${resource.price ? `💰 ${resource.price}<br>` : ""}
            ${resource.paidFeature ? `✨ ${resource.paidFeature}<br>` : ""}
            ${resource.format ? `📦 ${resource.format}` : ""}
          </div>

          <div class="resource-tags">
            ${resource.exams.slice(0, 3).map(e => `<span class="tag${resource.popular ? ' popular' : ''}">${e}</span>`).join("")}
            ${resource.exams.length > 3 ? `<span class="tag">+${resource.exams.length - 3} more</span>` : ""}
            ${resource.free ? `<span class="tag" style="background: rgba(5,150,105,0.1); color: var(--success);">FREE</span>` : ""}
          </div>

          <div class="resource-footer">
            <div class="resource-footer-info">
              ${resource.free ? '<span class="free-badge">✓ FREE</span>' : '<span style="color: var(--accent); font-weight: 600;">💳 PAID</span>'}
            </div>
            <a href="${resource.url}" target="_blank" class="btn btn-primary resource-btn">
              Visit →
            </a>
          </div>
        </div>
      `).join("");
    }

    function applyFilters() {
      const activeType = document.querySelector(".resource-filter-btn.active").dataset.type;
      const searchQuery = document.getElementById("resourceSearch").value.toLowerCase();

      let filtered = studyResources;

      if (activeType !== "all") {
        filtered = filtered.filter(r => r.type === activeType);
      }

      if (searchQuery) {
        filtered = filtered.filter(r =>
          r.name.toLowerCase().includes(searchQuery) ||
          r.category.toLowerCase().includes(searchQuery) ||
          r.exams.some(e => e.toLowerCase().includes(searchQuery)) ||
          r.description.toLowerCase().includes(searchQuery)
        );
      }

      renderResources(filtered);
    }

    document.addEventListener("DOMContentLoaded", () => {

      // Profile container
      const profileContainer = document.getElementById("profileContainer");
      const user = getCurrentUser();
      if (user) {
        profileContainer.innerHTML = `
          <a href="profile.html" class="profile-avatar" title="Go to Profile">
            ${user.charAt(0).toUpperCase()}
          </a>
        `;
      }

      // Mobile menu toggle
      const menuToggle = document.getElementById("menuToggle");
      menuToggle?.addEventListener("click", () => {
        menuToggle.classList.toggle("active");
        navLinks.classList.toggle("active");
      });

      // Filter buttons

        btn.addEventListener("click", () => {
          document.querySelectorAll(".resource-filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          applyFilters();
        });
      });

      // Search
      document.getElementById("resourceSearch").addEventListener("input", applyFilters);

      renderResources(studyResources);
    });
